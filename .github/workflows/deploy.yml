
name: Terraform Deploy

on:
  #uncomment the following lines to trigger the workflow on push or pull_request to main branch
  # push:
  #   branches:
  #     - main

  # pull_request:
  #   branches:
  #     - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose the workflow action'
        required: true
        default: apply
        type: choice
        options:
          - apply
          - destroy

permissions:
  id-token: write
  contents: read

jobs:
  terraform-deploy:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get AWS region from Terraform vars
        id: get_aws_region
        run: |
          region=$(sed -n 's/.*default\s*=\s*"\(.*\)".*/\1/p' variable.tf | head -n 1)
          if [ -z "$region" ]; then
            echo "ERROR: Could not determine AWS region from variable.tf"
            exit 1
          fi
          echo "region=$region" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::900335273390:role/RoleForGHA
          aws-region: ${{ steps.get_aws_region.outputs.region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format
        run: terraform fmt -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  terraform-destroy:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    runs-on: ubuntu-latest
    environment: destroy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get AWS region from Terraform vars
        id: get_aws_region
        run: |
          region=$(sed -n 's/.*default\s*=\s*"\(.*\)".*/\1/p' variable.tf | head -n 1)
          if [ -z "$region" ]; then
            echo "ERROR: Could not determine AWS region from variable.tf"
            exit 1
          fi
          echo "region=$region" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::900335273390:role/RoleForGHA
          aws-region: ${{ steps.get_aws_region.outputs.region }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan (Destroy)
        run: terraform plan -destroy -out=tfplan

      - name: Terraform Destroy
        run: terraform apply -auto-approve tfplan